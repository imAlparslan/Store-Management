name: Build
run-name: ${{ github.actor }} - build all solutions
on:
  push:
  workflow_dispatch:
jobs:
  prepare-cache:
    name: Prepare Cache
    runs-on: [self-hosted]
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Setup .NET and cache NuGet global-packages
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

  build-sharedkernel:
    name: Build SharedKernel
    needs: prepare-cache
    runs-on: [self-hosted]
    steps:
      - name: Check out repository 
        uses: actions/checkout@v5
      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore SharedKernel solution
        run: dotnet restore SharedKernel/SharedKernel.slnx
      - name: Build SharedKernel solution
        run: dotnet build SharedKernel/SharedKernel.slnx --configuration Release --no-restore

  build-catalogmanagement:
    name: Build CatalogManagement
    needs: prepare-cache
    runs-on: [self-hosted]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore CatalogManagement solution
        run: dotnet restore CatalogManagement/CatalogManagement.slnx
      - name: Build CatalogManagement solution
        run: dotnet build CatalogManagement/CatalogManagement.slnx --configuration Release --no-restore

  build-inventorymanagement:
    name: Build InventoryManagement
    needs: prepare-cache
    runs-on: [self-hosted]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore InventoryManagement solution
        run: dotnet restore InventoryManagement/InventoryManagement.slnx
      - name: Build InventoryManagement solution
        run: dotnet build InventoryManagement/InventoryManagement.slnx --configuration Release --no-restore

  build-storedefinition:
    name: Build StoreDefinition
    needs: prepare-cache
    runs-on: [self-hosted]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore StoreDefinition solution
        run: dotnet restore StoreDefinition/StoreDefinition.slnx
      - name: Build StoreDefinition solution
        run: dotnet build StoreDefinition/StoreDefinition.slnx --configuration Release --no-restore
