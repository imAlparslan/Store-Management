name: Build
run-name: ${{ github.actor }} - build all solutions
on:
  push:
  workflow_dispatch:
jobs:
  build-sharedkernel:
    name: Build SharedKernel
    runs-on: [self-hosted]
    steps:
      - name: Check out repository 
        uses: actions/checkout@v5
      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-packages-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            nuget-packages-${{ runner.os }}-
      - name: Restore SharedKernel solution
        run: dotnet restore SharedKernel/SharedKernel.slnx
      - name: Build SharedKernel solution
        run: dotnet build SharedKernel/SharedKernel.slnx --configuration Release --no-restore

  build-catalogmanagement:
    name: Build CatalogManagement
    runs-on: [self-hosted, macos, x64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Setup .NET from global.json
